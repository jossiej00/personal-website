bio: >
  I am a PhD researcher at the intersection of machine learning and information theory.
  My work focuses on developing scalable computational methods to understand
  gene regulatory networks and their role in distributed systems. Previously, I
  completed my BSc in Statistics at University of British Columbia.
bio_short: >
  PhD researcher building ML methods for information theory. Passionate about open science,
  elegant code, and turning biological complexity into tractable problems.

