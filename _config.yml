# ============================================================
#  Personal Website Configuration
#  Edit _data/profile.yml  → personal info, social links, CV
#  Edit _data/research.yml → publications & preprints
#
#  Blog:
#   - Published posts: _posts/YYYY-MM-DD-title.md
#   - Draft posts:     _drafts/YYYY-MM-DD-title.md
#     (drafts are NOT rendered; preview locally with: jekyll serve --drafts)
# ============================================================

title: Personal Website
description: Academic personal website
url: "https://jossiej00.github.io"
baseurl: "/personal-website"

# ── Jekyll settings ─────────────────────────────────────────
plugins:
  - jekyll-seo-tag

# Blog post URLs: /blog/post-title/
permalink: /blog/:slug/

# ── Default layouts ──────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "blog-post"

# ── Build settings ──────────────────────────────────────────
# Drafts in _drafts/ are excluded by default.
# To preview drafts locally: bundle exec jekyll serve --drafts
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - LICENSE.txt
  - "*.sh"
