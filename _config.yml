# ============================================================
#  Personal Website Configuration
#  Edit _data/profile.yml  → personal info, social links, CV
#  Edit _data/research.yml → publications & preprints
# ============================================================

title: Personal Website
description: Academic personal website

# ── Jekyll settings ─────────────────────────────────────────
plugins:
  - jekyll-seo-tag

permalink: /:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# ── Build settings ──────────────────────────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - LICENSE.txt
  - "*.sh"
